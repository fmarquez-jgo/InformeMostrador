    .bg-overlay { position: fixed; inset: 0; background: linear-gradient(160deg, rgba(10,22,40,0.45) 0%, rgba(10,22,40,0.20) 50%, rgba(10,22,40,0.50) 100%); z-index: 1; }
    .page-wrap { position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: rgba(10,22,40,0.82); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.10); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1.1rem; }
    header img { height: 46px; width: auto; flex-shrink: 0; }
    .header-divider { width: 1px; height: 40px; background: rgba(255,255,255,0.18); flex-shrink: 0; }
    header h1 { font-size: 1.15rem; font-weight: 700; color: #fff; letter-spacing: .01em; }
    header h1 span { display: block; font-size: .75rem; font-weight: 400; color: rgba(255,255,255,.50); margin-top: 2px; }
    main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 2.5rem 1rem 2rem; }
    .card { background: var(--card); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 100%; max-width: 680px; box-shadow: 0 8px 32px rgba(0,0,0,0.28), 0 1px 0 rgba(255,255,255,0.6) inset; }
    #drop-zone { border: 2px dashed #c5cad4; border-radius: 12px; padding: 2.5rem 1rem; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; position: relative; }
    #drop-zone:hover, #drop-zone.dragover { border-color: var(--green-border); background: var(--green-light); }
    #drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    #drop-zone .icon { font-size: 2.4rem; display: block; margin-bottom: .55rem; }
    #drop-zone .main-txt { font-size: .97rem; font-weight: 600; }
    #drop-zone .sub-txt { font-size: .8rem; color: var(--muted); margin-top: 4px; }
    #file-list { margin-top: 1.1rem; display: flex; flex-direction: column; gap: .45rem; }
    .file-card { display: flex; align-items: center; gap: .6rem; padding: .55rem .85rem; border: 1px solid #e5e8ed; border-radius: 9px; background: #f8f9fb; font-size: .84rem; }
    .file-card .pdf-icon { font-size: 1.15rem; flex-shrink: 0; }
    .file-card .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .file-card .size { color: var(--muted); flex-shrink: 0; font-size: .76rem; }
    .badge { flex-shrink: 0; padding: 2px 10px; border-radius: 20px; font-size: .71rem; font-weight: 600; }
    .badge-wait    { background: #eef0f3; color: var(--muted); }
    .badge-ok      { background: #dcf5e8; color: var(--green); }
    .badge-error   { background: var(--red-light); color: var(--red); }
    .badge-working { background: #fff8e1; color: #b07d00; }
    .remove-btn { background: none; border: none; cursor: pointer; color: #b0b8c4; font-size: .92rem; padding: 2px 5px; border-radius: 5px; flex-shrink: 0; transition: color .15s; }
    .remove-btn:hover { color: var(--red); }
    #btn-process { display: block; width: 100%; margin-top: 1.3rem; padding: .85rem; background: linear-gradient(135deg,#1a7f4b,#2da05f); color: #fff; border: none; border-radius: 10px; font-size: .97rem; font-weight: 700; cursor: pointer; letter-spacing: .02em; box-shadow: 0 3px 12px rgba(26,127,75,.30); transition: opacity .2s, transform .1s; }
    #btn-process:hover:not(:disabled) { opacity: .92; transform: translateY(-1px); }
    #btn-process:active:not(:disabled) { transform: translateY(0); }
    #btn-process:disabled { background: #b0bec5; box-shadow: none; cursor: not-allowed; transform: none; }
    #log { display: none; margin-top: 1.1rem; background: #0d1f35; color: #7fd9a0; font-family: 'Courier New',monospace; font-size: .76rem; padding: .85rem 1rem; border-radius: 9px; max-height: 170px; overflow-y: auto; line-height: 1.65; }
    #results { margin-top: .9rem; display: flex; flex-direction: column; gap: .45rem; }
    .result-row { display: flex; align-items: center; gap: .65rem; padding: .6rem .9rem; border-radius: 9px; background: #e8f8ef; border: 1px solid #b2dfcb; font-size: .84rem; }
    .result-row .r-name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .result-row .r-info { font-size: .74rem; color: var(--green); flex-shrink: 0; }
    .dl-btn { padding: 5px 14px; background: var(--green); color: #fff; border-radius: 7px; font-size: .76rem; font-weight: 700; text-decoration: none; white-space: nowrap; flex-shrink: 0; transition: background .15s; }
    .dl-btn:hover { background: var(--green-border); }
    footer { text-align: center; font-size: 11px; color: rgba(255,255,255,.40); padding: 1rem; position: relative; z-index: 2; }
    @media (max-width:600px) {
      header { padding: .65rem 1rem; gap: .75rem; }
      header img { height: 36px; }
      header h1 { font-size: 1rem; }
      header h1 span { font-size: .68rem; }
      main { padding: 1.2rem .75rem 1.5rem; }
      .card { padding: 1.4rem 1rem; border-radius: 12px; }
      #drop-zone { padding: 1.8rem .75rem; }
      #btn-process { font-size: .9rem; padding: .75rem; }
    }
    @media (max-width:380px) {
      header img { height: 30px; }
      header h1 { font-size: .88rem; }
      .card { padding: 1.1rem .8rem; }
    }
  </style>
</head>

    <div class="header-divider"></div>
    <h1>Mostrador PDF Fix<span>Corrector de enlaces en reportes de booking</span></h1>
  </header>
  <main>
    <div class="card">
      <div id="drop-zone">
        <input type="file" id="file-input" accept=".pdf" multiple />
        <span class="icon">📂</span>
        <p class="main-txt">Arrastrá los PDFs acá</p>
        <p class="sub-txt">o hacé clic para seleccionar archivos</p>
      </div>
      <div id="file-list"></div>
      <button id="btn-process" disabled>⚙️&nbsp; Corregir enlaces</button>
      <div id="log"></div>
      <div id="results"></div>
    </div>
  </main>
  <footer>JGO Haciendo Logística &mdash; FernandoMarquez</footer>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
  const { PDFDocument, PDFName, PDFNumber } = PDFLib;
  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const fileList   = document.getElementById('file-list');
  const btnProcess = document.getElementById('btn-process');
  const logEl      = document.getElementById('log');
  const resultsEl  = document.getElementById('results');
  let files = [];

  // Calibrado con análisis pixel del PDF real
  const X_FOTO_INICIO = 949.0;   // X del primer thumbnail
  const PASO_FOTO     = 28.1;    // paso horizontal entre thumbnails
  const ANCHO_LINK    = 22.5;    // ancho de cada link
  const Y_OFFSET      = 7.0;     // corrección vertical: fotos están 7pt más abajo

  function fmt(b) {
    return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';
  }
  function log(msg) {
    logEl.style.display='block'; logEl.innerHTML+=msg+'<br>'; logEl.scrollTop=logEl.scrollHeight;
  }
  function setBadge(i,type,text) {
    const b=document.getElementById('badge-'+i);
    if(b){ b.className='badge badge-'+type; b.textContent=text; }
  }
  function renderList() {
    fileList.innerHTML='';
    files.forEach((f,i)=>{
      const c=document.createElement('div');
      c.className='file-card'; c.id='card-'+i;
      c.innerHTML=`<span class="pdf-icon">📄</span>
        <span class="name" title="${f.file.name}">${f.file.name}</span>
        <span class="size">${fmt(f.file.size)}</span>
        <span class="badge badge-wait" id="badge-${i}">Pendiente</span>
        <button class="remove-btn" data-idx="${i}" title="Quitar">✕</button>`;
      fileList.appendChild(c);
    });
    fileList.querySelectorAll('.remove-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        files.splice(parseInt(btn.dataset.idx),1); renderList(); btnProcess.disabled=files.length===0;
      });
    });
    btnProcess.disabled=files.length===0;
  }
  function addFiles(newFiles) {
    for(const f of newFiles){
      if(f.name.toLowerCase().endsWith('.pdf')&&!files.find(e=>e.file.name===f.name&&e.file.size===f.size))
        files.push({file:f});
    }
    renderList();
  }
  fileInput.addEventListener('change',e=>addFiles(e.target.files));
  dropZone.addEventListener('dragover', e=>{e.preventDefault();dropZone.classList.add('dragover');});
  dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');addFiles(e.dataTransfer.files);});

  async function fixPdf(fileObj,idx) {
    setBadge(idx,'working','Procesando…');
    log('📄 '+fileObj.file.name);
    const buf    = await fileObj.file.arrayBuffer();
    const pdfDoc = await PDFDocument.load(buf);
    const pages  = pdfDoc.getPages();
    let total=0;

    for(let p=0;p<pages.length;p++){
      const page=pages[p];
      const annotsRef=page.node.get(PDFName.of('Annots'));
      if(!annotsRef) continue;
      const annots=pdfDoc.context.lookup(annotsRef);
      if(!annots||typeof annots.get!=='function') continue;
      const count=annots.size();

      const byRow={};
      for(let a=0;a<count;a++){
        const ann=pdfDoc.context.lookup(annots.get(a));
        if(!ann) continue;
        const sub=ann.get(PDFName.of('Subtype'));
        if(!sub||sub.encodedName!=='/Link') continue;
        const rObj=ann.get(PDFName.of('Rect'));
        if(!rObj) continue;
        const rect=pdfDoc.context.lookup(rObj);
        if(!rect) continue;
        const key=Math.round(rect.get(1).numberValue);
        if(!byRow[key]) byRow[key]=[];
        byRow[key].push(rect);
      }

      for(const key of Object.keys(byRow)){
        const row=byRow[key];
        row.sort((a,b)=>a.get(0).numberValue-b.get(0).numberValue);
        row.forEach((rect,i)=>{
          const origY0=rect.get(1).numberValue;
          const origY1=rect.get(3).numberValue;
          rect.set(0, PDFNumber.of(X_FOTO_INICIO + i*PASO_FOTO));
          rect.set(2, PDFNumber.of(X_FOTO_INICIO + i*PASO_FOTO + ANCHO_LINK));
          rect.set(1, PDFNumber.of(origY0 + Y_OFFSET));
          rect.set(3, PDFNumber.of(origY1 + Y_OFFSET));
          total++;
        });
        if(row.length>0) log(`  → Pág ${p+1}, fila ${key}: ${row.length} link(s)`);
      }
    }

    if(total===0){ log('  ℹ️ Sin links'); setBadge(idx,'ok','Sin cambios'); }
    else{ log('  ✅ '+total+' corregidos'); setBadge(idx,'ok',total+' fix'); }

    const bytes=await pdfDoc.save();
    const url=URL.createObjectURL(new Blob([bytes],{type:'application/pdf'}));
    const dl=fileObj.file.name.replace(/\.pdf$/i,'')+'_fix.pdf';
    const row=document.createElement('div');
    row.className='result-row';
    row.innerHTML=`<span>✅</span><span class="r-name">${dl}</span>
      <span class="r-info">${fmt(bytes.byteLength)}</span>
      <a class="dl-btn" href="${url}" download="${dl}">⬇ Descargar</a>`;
    resultsEl.appendChild(row);
  }

  btnProcess.addEventListener('click',async()=>{
    btnProcess.disabled=true; logEl.innerHTML=''; resultsEl.innerHTML='';
    log('🔧 Iniciando...');
    for(let i=0;i<files.length;i++){
      try{ await fixPdf(files[i],i); }
      catch(e){ setBadge(i,'error','Error'); log('  ❌ '+e.message); }
    }
    log('✔ Listo.');
    btnProcess.disabled=false;
  });
</script>
</body>
</html>
